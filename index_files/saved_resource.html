<html lang="vi"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Em Là Một Bông Hoa Xinh Đẹp</title>
    <link href="./css2" rel="stylesheet">
    <style>
        /* CSS giúp tràn toàn màn hình */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
        }

        #title-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
            pointer-events: none;
        }

        #title {
            font-family: 'Pacifico', cursive;
            font-size: clamp(2rem, 8vw, 5rem);
            background: linear-gradient(to bottom, #ffffff, #ff99cc, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(255, 20, 147, 0.7));
            animation: pulse 2s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.9; }
            to { transform: scale(1.05); opacity: 1; }
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <div id="title-container">
        <div id="title">Em Là Một Bông Hoa Xinh Đẹp</div>
    </div>
    <canvas id="canvas" width="1469" height="727"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // Hàm xử lý kích thước canvas luôn khớp màn hình
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let particles = [];
        const colors = ['#ff85a2', '#ff477e', '#ff0a54', '#fbb1bd', '#ffd700', '#ffffff'];

        class Particle {
            constructor(x, y, color, speedX, speedY, size, type) {
                this.x = x; this.y = y; this.color = color;
                this.speedX = speedX; this.speedY = speedY;
                this.size = size; this.type = type; this.opacity = 1;
                this.gravity = (type === 'rain') ? 0.015 : 0.04;
                this.friction = 0.98;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                if (this.type === 'heart' || this.type === 'rain') {
                    this.drawHeart(this.x, this.y, this.size);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            drawHeart(x, y, size) {
                ctx.beginPath(); ctx.moveTo(x, y);
                ctx.bezierCurveTo(x, y - size/2, x - size, y - size/2, x - size, y);
                ctx.bezierCurveTo(x - size, y + size/2, x, y + size, x, y + size * 1.3);
                ctx.bezierCurveTo(x, y + size, x + size, y + size/2, x + size, y);
                ctx.bezierCurveTo(x + size, y - size/2, x, y - size/2, x, y);
                ctx.fill();
            }

            update() {
                this.speedY += this.gravity;
                this.speedX *= this.friction; this.speedY *= this.friction;
                this.x += this.speedX; this.y += this.speedY;
                this.opacity -= (this.type === 'rain') ? 0.005 : 0.01;
            }
        }

        function createFirework(x, y) {
            const count = 30;
            const color = colors[Math.floor(Math.random() * colors.length)];
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i;
                const speed = Math.random() * 5 + 2;
                particles.push(new Particle(x, y, color, Math.cos(angle)*speed, Math.sin(angle)*speed, Math.random()*4+2, 'heart'));
            }
        }

        function burst(x, y) {
            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 2;
                particles.push(new Particle(x, y, '#ff0040', Math.cos(angle)*speed, Math.sin(angle)*speed, 7, 'heart'));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.18)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.05) createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.7);
            if (Math.random() < 0.1) particles.push(new Particle(Math.random()*canvas.width, -10, '#ffb6c1', (Math.random()-0.5), 1.5, Math.random()*4+4, 'rain'));

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) particles.splice(i, 1);
            }
            requestAnimationFrame(animate);
        }

        // Tương tác chuột và cảm ứng
        window.addEventListener('mousedown', (e) => burst(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => {
            // Ngăn chặn cuộn trang khi chạm để pháo hoa mượt hơn
            e.preventDefault();
            burst(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });

        animate();
    </script>
