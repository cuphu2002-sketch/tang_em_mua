<html lang="vi"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Là Một Bông Hoa Xinh - Premium</title>
    <link href="./css2" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050505; /* Đen sâu để nổi bật hiệu ứng */
            font-family: 'Dancing Script', cursive;
        }

        #title-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
            pointer-events: none; /* Để khi click xuyên qua chữ vẫn tạo được tim */
        }

        #title {
            font-family: 'Pacifico', cursive;
            font-size: clamp(2.5rem, 8vw, 5rem); /* Tự động co giãn theo màn hình */
            color: #fff;
            text-shadow: 
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #ff69b4,
                0 0 82px #ff69b4,
                0 0 92px #ff69b4,
                0 0 102px #ff69b4,
                0 0 151px #ff69b4;
            animation: pulse 2s infinite alternate;
        }

        /* Hiệu ứng nhịp đập cho chữ */
        @keyframes pulse {
            from {
                transform: scale(1);
                opacity: 0.9;
            }
            to {
                transform: scale(1.05);
                opacity: 1;
            }
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="title-container">
        <div id="title">Em Là Một Bông Hoa Xinh</div>
    </div>
    <canvas id="canvas" width="605" height="727"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const colors = ['#ff85a2', '#ff477e', '#ff0a54', '#fbb1bd', '#ff99ac'];

        class Particle {
            constructor(x, y, color, speedX, speedY, size, type) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.speedX = speedX;
                this.speedY = speedY;
                this.size = size;
                this.type = type; 
                this.opacity = 1;
                this.gravity = 0.04;
                this.friction = 0.97;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                
                if (this.type === 'heart') {
                    this.drawHeart(this.x, this.y, this.size);
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }

            drawHeart(x, y, size) {
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.bezierCurveTo(x, y - size / 2, x - size, y - size / 2, x - size, y);
                ctx.bezierCurveTo(x - size, y + size / 2, x, y + size, x, y + size * 1.3);
                ctx.bezierCurveTo(x, y + size, x + size, y + size / 2, x + size, y);
                ctx.bezierCurveTo(x + size, y - size / 2, x, y - size / 2, x, y);
                ctx.fill();
            }

            update() {
                this.speedY += this.gravity;
                this.speedX *= this.friction;
                this.speedY *= this.friction;
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.008;
            }
        }

        // Tạo hiệu ứng nổ pháo hoa trái tim
        function createFirework(x, y) {
            const particleCount = 35;
            for (let i = 0; i < particleCount; i++) {
                const angle = (Math.PI * 2 / particleCount) * i;
                const speed = Math.random() * 4 + 2;
                particles.push(new Particle(
                    x, y, 
                    colors[Math.floor(Math.random() * colors.length)], 
                    Math.cos(angle) * speed, 
                    Math.sin(angle) * speed, 
                    Math.random() * 4 + 2, 
                    'heart'
                ));
            }
        }

        // Hiệu ứng nổ 360 độ khi chạm
        function burst360(x, y) {
            const heartCount = 40;
            for (let i = 0; i < heartCount; i++) {
                const angle = (Math.PI * 2 / heartCount) * i;
                const speed = 7;
                particles.push(new Particle(x, y, '#ff0040', Math.cos(angle) * speed, Math.sin(angle) * speed, 8, 'heart'));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)'; // Tạo đuôi mờ cho pháo hoa
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (Math.random() < 0.04) {
                createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.8);
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].opacity <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousedown', (e) => burst360(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => {
            e.preventDefault();
            burst360(e.touches[0].clientX, e.touches[0].clientY);
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        animate();
    </script>
